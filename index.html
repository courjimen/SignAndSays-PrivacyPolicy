<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #444;
            line-height: 1.6;
            margin: 0; padding: 40px 20px;
            background-color: #fcfcfc;
        }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        header { border-bottom: 3px solid #BDE0FE; padding-bottom: 20px; margin-bottom: 30px; }
        h1 { color: #DDB892; font-size: 24pt; margin: 0; }
        h2, h3 { color: #CED4D0; margin-top: 25px; }
        .summary-box {
            background-color: #ECD7F7; /* Pastel Lavender */
            padding: 20px; border-radius: 10px; margin-bottom: 30px;
        }
        .intro-text { border-left: 5px solid #E9EDC9; padding-left: 15px; margin-bottom: 20px; }
        a { color: #F4CA85; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Privacy Policy</h1>
            <p>Effective Date: May 6, 2026</p>
        </header>
        <div class="intro-text">Sign & Says is committed to privacy. We collect the bare minimum required for the app to function.</div>
        <div class="summary-box">
            <h3 style="margin-top:0; color: #444;">Quick Summary</h3>
            <ul>
                <li>No user tracking or analytics.</li>
                <li>No selling or sharing personal data.</li>
                <li>No advertisements.</li>
            </ul>
        </div>
        </div>
</body>
</html>
